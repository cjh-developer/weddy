spring:
  application:
    name: weddy
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 25MB
  datasource:
    url: jdbc:mysql://localhost:3306/weddy?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: weddy
    password: weddy01
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true
  sql:
    init:
      mode: never

server:
  port: 8080
  forward-headers-strategy: NATIVE

jwt:
  secret: dev-only-local-secret-must-be-changed-before-production-32chars
  expiration: 86400000
  refresh-expiration: 604800000

cors:
  # 모바일 앱(Android/iOS) 배포 환경 — CORS는 브라우저 전용 제약이므로 와일드카드 허용
  allowed-origins: "*"

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

file:
  upload-dir: ./uploads

logging:
  level:
    com.project.weddy: DEBUG
