spring:
  application:
    name: weddy
  datasource:
    url: jdbc:mysql://localhost:3306/weddy?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: weddy
    password: weddy01
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
    show-sql: false
  sql:
    init:
      mode: never

server:
  port: 8080
  # 리버스 프록시(Nginx/ALB) 뒤에서 실제 클라이언트 IP를 올바르게 추출하기 위한 설정
  # X-Forwarded-For 헤더를 Spring이 검증하여 request.getRemoteAddr()에 실제 IP를 반영한다
  forward-headers-strategy: NATIVE

jwt:
  # 운영 환경: JWT_SECRET 환경변수로 주입 (최소 32자 이상 랜덤 문자열)
  # 개발 환경: application-dev.yml에서 오버라이드
  secret: dev-only-local-secret-must-be-changed-before-production-32chars
  expiration: 86400000
  refresh-expiration: 604800000

cors:
  allowed-origins: "*"

logging:
  level:
    com.project.weddy: INFO
